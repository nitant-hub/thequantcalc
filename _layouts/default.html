<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | thequantcals</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "thequantcals",
      "url": "https://thequantcals.com",
      "description": "A premium web platform offering advanced calculators, generators, and tools for finance, math, and analytics."
    }
    </script>

    <style>
        /* BASE THEME VARIABLES */
        :root {
            --bg-primary: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%); 
            --header-height: 70px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        /* GLOBAL RESET */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
        }
        
        html, body {
            overflow-x: hidden;
            height: auto; 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding-top: var(--header-height); 
        }

        /* THE DEEP BLUE HEADER */
        header#mainHeader {
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important;
            width: 100% !important;
            height: var(--header-height) !important;
            z-index: 9999 !important; 
            
            background: linear-gradient(135deg, #0b1329 0%, #1e3a8a 100%) !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 4px 25px rgba(15, 23, 42, 0.3) !important;
            
            padding: 0 1.5rem !important;
            display: flex !important; 
            justify-content: space-between !important; 
            align-items: center !important;
        }

        /* BRANDING */
        .brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
        .logo-symbol {
            background: var(--accent-gradient); 
            width: 38px; 
            height: 38px; 
            border-radius: 10px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
            font-size: 1.3rem;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        
        #mainHeader .brand-title {
            font-size: 1.45rem !important; 
            font-weight: 800 !important;
            letter-spacing: -0.5px !important;
            color: #ffffff !important;
            background: none !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        /* NAVIGATION ACTIONS */
        .nav-actions { display: flex; align-items: center; gap: 1.2rem; }
        
        #mainHeader .theme-toggle { 
            background: none; 
            border: none; 
            font-size: 1.3rem; 
            cursor: pointer; 
            color: #ffffff !important; 
            padding: 5px; 
            transition: transform 0.2s, opacity 0.2s; 
        }
        #mainHeader .theme-toggle:hover { transform: scale(1.1); opacity: 0.9; }

        /* HAMBURGER MENU */
        #mainHeader .menu-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            z-index: 10001; 
            padding: 5px;
        }
        #mainHeader .menu-btn span { 
            width: 25px; 
            height: 3px; 
            background-color: #ffffff !important; 
            border-radius: 2px; 
            transition: transform 0.3s ease, opacity 0.3s ease; 
        }
        
        #mainHeader .menu-btn.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        #mainHeader .menu-btn.active span:nth-child(2) { opacity: 0; }
        #mainHeader .menu-btn.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        
        /* SIDE SLIDE MENU */
        .nav-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
            background: var(--bg-surface); border-left: 1px solid var(--border-color);
            padding: 5rem 2rem 2rem 2rem; display: flex; flex-direction: column; gap: 1.5rem;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -5px 0 25px rgba(0,0,0,0.1);
            z-index: 10000;
        }
        .nav-menu.active { right: 0; }
        .nav-menu a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 1.1rem; transition: color 0.2s; }
        .nav-menu a:hover { color: #2563eb; }
        .nav-menu .category-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-top: 1rem; }

        /* CONTENT WRAPPER */
        .wrapper { max-width: 1200px; width: 100%; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }

        /* FOOTER */
        footer { background: var(--bg-surface); border-top: 1px solid var(--border-color); padding: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .footer-links a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: var(--text-main); text-decoration: underline; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <a href="/" class="brand">
            <div class="logo-symbol">∑</div>
            <div class="brand-title">thequantcals</div>
        </a>
        
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle Navigation">
                <span></span><span></span><span></span>
            </button>
        </div>

        <nav class="nav-menu" id="navMenu">
            <div class="category-label">Tools Categories</div>
            <a href="/#finance">📈 Finance Calculators</a>
            <a href="/#math">📐 Math Tools</a>
            <a href="/#generators">⚡ Generators</a>
            <hr style="border: 0; border-top: 1px solid var(--border-color);">
            <a href="/">Home</a>
            <a href="/about.html">About Us</a>
        </nav>
    </header>

    <main class="wrapper">
        <h2 style="margin-top: 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            🧮 Interactive Calculator
        </h2>
        
        <div style="background: var(--bg-surface); border: 1px solid var(--border-color); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <p>Your calculator interface goes here!</p>
        </div>
        </main>

    <footer>
        <p>&copy; 2026 thequantcals. All rights reserved.</p>
        <div class="footer-links">
            <a href="/privacy-policy.html">Privacy Policy</a>
            <a href="/terms-of-service.html">Terms of Service</a>
            <a href="/disclaimer.html">Disclaimer</a>
            <a href="/contact.html">Contact Us</a>
        </div>
    </footer>

    <script>
        // Menu & Hamburger Animation Handler
        const menuBtn = document.getElementById('menuBtn');
        const navMenu = document.getElementById('navMenu');
        if(menuBtn && navMenu) {
            menuBtn.addEventListener('click', () => {
                menuBtn.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }

        // Theme Switcher Engine
        const themeToggle = document.getElementById('themeToggle');
        const htmlEl = document.documentElement;
        if(themeToggle) {
            if (localStorage.getItem('theme') === 'dark') {
                htmlEl.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                const isDark = htmlEl.getAttribute('data-theme') === 'dark';
                htmlEl.setAttribute('data-theme', isDark ? 'light' : 'dark');
                themeToggle.textContent = isDark ? '🌙' : '☀️';
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            });
        }
    </script>
</body>
</html>
