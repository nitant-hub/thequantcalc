<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | thequantcals</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "thequantcals",
      "url": "https://thequantcals.com",
      "description": "A premium web platform offering advanced calculators, generators, and tools for finance, math, and analytics."
    }
    </script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
            --header-height: 70px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body { overflow-x: hidden; height: auto; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--header-height);
            transition: background-color 0.3s, color 0.3s;
        }

        header#mainHeader {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: var(--header-height);
            z-index: 9999;
            background: linear-gradient(135deg, #020818 0%, #0d1f5c 40%, #1a3a8f 75%, #0e2d6b 100%);
            border-bottom: 1px solid rgba(99, 179, 255, 0.25);
            box-shadow:
                0 2px 0 rgba(99, 179, 255, 0.15),
                0 4px 30px rgba(10, 20, 80, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        header#mainHeader::before {
            content: '';
            position: absolute;
            top: -40px; left: 30%;
            width: 200px; height: 120px;
            background: radial-gradient(ellipse, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        header#mainHeader::after {
            content: '';
            position: absolute;
            top: -20px; right: 15%;
            width: 150px; height: 90px;
            background: radial-gradient(ellipse, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand {
            display: flex; align-items: center; gap: 0.6rem;
            text-decoration: none; position: relative; z-index: 1;
        }

        .logo-symbol {
            background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 1.3rem; flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(56, 189, 248, 0.45), 0 0 0 1px rgba(255,255,255,0.1);
        }

        .brand-title {
            font-size: 1.45rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(90deg, #e0f2fe 0%, #bae6fd 60%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-actions {
            display: flex; align-items: center; gap: 1rem;
            position: relative; z-index: 1;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; font-size: 1.1rem; cursor: pointer;
            color: #ffffff; padding: 6px 9px; line-height: 1;
            transition: background 0.2s, transform 0.2s;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.18); transform: scale(1.08); }

        .menu-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; gap: 5px;
            z-index: 10001; padding: 8px 10px; transition: background 0.2s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.18); }
        .menu-btn span {
            display: block; width: 22px; height: 2.5px;
            background-color: #ffffff; border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .menu-btn.active span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .menu-btn.active span:nth-child(2) { opacity: 0; }
        .menu-btn.active span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        .nav-menu {
            position: fixed; top: 0; right: -300px;
            width: 300px; height: 100vh;
            background: var(--bg-surface);
            border-left: 1px solid var(--border-color);
            padding: 5rem 2rem 2rem 2rem;
            display: flex; flex-direction: column; gap: 1.5rem;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 10000;
        }
        .nav-menu.active { right: 0; }
        .nav-menu a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 1.1rem; transition: color 0.2s; }
        .nav-menu a:hover { color: #2563eb; }
        .nav-menu .category-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-top: 1rem; }

        .wrapper { max-width: 1200px; width: 100%; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }

        /* BREADCRUMB CSS ADDED HERE */
        .breadcrumb-nav {
            padding: 0 0 1.5rem 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .breadcrumb-nav a {
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.2s;
        }
        .breadcrumb-nav a:hover {
            text-decoration: underline;
        }
        .breadcrumb-nav .separator {
            margin: 0 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .breadcrumb-nav .current-page {
            color: var(--text-main);
            font-weight: 500;
        }

        footer {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            padding: 2rem; text-align: center;
            font-size: 0.9rem; color: var(--text-muted);
        }
        .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .footer-links a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: var(--text-main); text-decoration: underline; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <a href="/" class="brand">
            <div class="logo-symbol">∑</div>
            <div class="brand-title">thequantcals</div>
        </a>

        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle Navigation">
                <span></span><span></span><span></span>
            </button>
        </div>

        <nav class="nav-menu" id="navMenu">
            <div class="category-label">Tools Categories</div>
            <a href="/#finance">📈 Finance Calculators</a>
            <a href="/#math">📐 Math Tools</a>
            <a href="/#generators">⚡ Generators</a>
            <hr style="border: 0; border-top: 1px solid var(--border-color);">
            <a href="/">Home</a>
            <a href="/about.html">About Us</a>
        </nav>
    </header>

    <main class="wrapper">
        
        {% if page.url != "/" and page.url != "/index.html" %}
        <nav aria-label="breadcrumb" class="breadcrumb-nav">
            <a href="/">Home</a> 
            <span class="separator">/</span>
            <span class="current-page">{{ page.title }}</span>
        </nav>
        {% endif %}

        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 thequantcals. All rights reserved.</p>
        <div class="footer-links">
            <a href="/privacy-policy.html">Privacy Policy</a>
            <a href="/terms-of-service.html">Terms of Service</a>
            <a href="/disclaimer.html">Disclaimer</a>
            <a href="/contact.html">Contact Us</a>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const navMenu = document.getElementById('navMenu');
        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', () => {
                menuBtn.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
            navMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    menuBtn.classList.remove('active');
                    navMenu.classList.remove('active');
                });
            });
        }

        const themeToggle = document.getElementById('themeToggle');
        const htmlEl = document.documentElement;
        if (themeToggle) {
            if (localStorage.getItem('theme') === 'dark') {
                htmlEl.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                const isDark = htmlEl.getAttribute('data-theme') === 'dark';
                htmlEl.setAttribute('data-theme', isDark ? 'light' : 'dark');
                themeToggle.textContent = isDark ? '🌙' : '☀️';
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            });
        }
    </script>
</body>
</html>
