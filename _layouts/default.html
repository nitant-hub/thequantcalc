<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | thequantcals</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "thequantcals",
      "url": "https://thequantcals.com",
      "description": "A premium web platform offering advanced calculators, generators, and tools for finance, math, and analytics."
    }
    </script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --header-bg: rgba(255, 255, 255, 0.95);
            --header-height: 70px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-bg: rgba(15, 23, 42, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        html, body {
            overflow-x: hidden;
            height: auto; 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding-top: var(--header-height); 
        }

        /* Bulletproof Header Setup
           Controlled via a custom CSS Variable to eliminate specificity wars 
        */
        header {
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important;
            width: 100% !important;
            height: var(--header-height) !important;
            z-index: 99999 !important; /* Forces it above any complex dashboard sidebars */
            background: var(--header-bg) !important; 
            backdrop-filter: blur(15px) !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 0 1.5rem !important;
            display: flex !important; 
            justify-content: space-between !important; 
            align-items: center !important;
            /* Inline variable tracking defaults to 0% if not set */
            transform: translateY(var(--header-transform, 0%)) !important; 
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important; 
            will-change: transform;
        }

        .brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .logo-symbol {
            background: var(--accent-gradient); width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem;
        }
        .brand-title {
            font-size: 1.4rem; font-weight: 800;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-actions { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-main); padding: 5px; }

        .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 100001; }
        .menu-btn span { width: 25px; height: 3px; background-color: var(--text-main); border-radius: 2px; transition: 0.3s; }
        
        .nav-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
            background: var(--bg-surface); border-left: 1px solid var(--border-color);
            padding: 5rem 2rem 2rem 2rem; display: flex; flex-direction: column; gap: 1.5rem;
            transition: right 0.3s ease-in-out; box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            z-index: 100000;
        }
        .nav-menu.active { right: 0; }
        .nav-menu a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 1.1rem; }
        .nav-menu .category-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-top: 1rem; }

        .wrapper { max-width: 1200px; width: 100%; margin: 2rem auto; padding: 0 1.5rem; flex: 1; }

        footer { background: var(--bg-surface); border-top: 1px solid var(--border-color); padding: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .footer-links a { color: var(--text-muted); text-decoration: none; }
        .footer-links a:hover { color: var(--text-main); text-decoration: underline; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <a href="/" class="brand">
            <div class="logo-symbol">∑</div>
            <div class="brand-title">thequantcals</div>
        </a>
        
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle Navigation">
                <span></span><span></span><span></span>
            </button>
        </div>

        <nav class="nav-menu" id="navMenu">
            <div class="category-label">Tools Categories</div>
            <a href="/#finance">📈 Finance Calculators</a>
            <a href="/#math">📐 Math Tools</a>
            <a href="/#generators">⚡ Generators</a>
            <hr style="border: 0; border-top: 1px solid var(--border-color);">
            <a href="/">Home</a>
            <a href="/about.html">About Us</a>
        </nav>
    </header>

    <div class="wrapper">
        {{ content }} 
    </div>

    <footer>
        <p>&copy; 2026 thequantcals. All rights reserved.</p>
        <div class="footer-links">
            <a href="/privacy-policy.html">Privacy Policy</a>
            <a href="/terms-of-service.html">Terms of Service</a>
            <a href="/disclaimer.html">Disclaimer</a>
            <a href="/contact.html">Contact Us</a>
        </div>
    </footer>

    <script>
        // Safe UI Initialization Wrapper
        try {
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');
            if(menuBtn && navMenu) {
                menuBtn.addEventListener('click', () => navMenu.classList.toggle('active'));
            }

            const themeToggle = document.getElementById('themeToggle');
            const htmlEl = document.documentElement;
            if(themeToggle) {
                if (localStorage.getItem('theme') === 'dark') {
                    htmlEl.setAttribute('data-theme', 'dark');
                    themeToggle.textContent = '☀️';
                }
                themeToggle.addEventListener('click', () => {
                    const isDark = htmlEl.getAttribute('data-theme') === 'dark';
                    htmlEl.setAttribute('data-theme', isDark ? 'light' : 'dark');
                    themeToggle.textContent = isDark ? '🌙' : '☀️';
                    localStorage.setItem('theme', isDark ? 'light' : 'dark');
                });
            }
        } catch (e) {
            console.error("UI standard features encountered an error initialization:", e);
        }

        // UNBREAKABLE INTERACTION ENGINE FOR HEADERS
        (function() {
            try {
                const header = document.getElementById('mainHeader');
                if (!header) return;

                let lastScrollY = 0;
                let touchStartY = 0;

                const hideHeader = () => header.style.setProperty('--header-transform', '-100%');
                const showHeader = () => header.style.setProperty('--header-transform', '0%');

                // 1. Capture All Scroll Vectors (Phase 1 Event Capture - cannot be blocked by inner divs)
                window.addEventListener('scroll', function(e) {
                    const target = e.target;
                    let currentScroll = 0;

                    if (target === document || target === window || target === document.documentElement) {
                        currentScroll = window.pageYOffset || document.documentElement.scrollTop;
                    } else if (target && target.scrollTop !== undefined) {
                        currentScroll = target.scrollTop;
                    }

                    if (currentScroll <= 20) {
                        showHeader();
                    } else if (currentScroll > lastScrollY && currentScroll > 60) {
                        hideHeader();
                    } else if (currentScroll < lastScrollY) {
                        showHeader();
                    }
                    lastScrollY = currentScroll;
                }, true); // True guarantees execution before child container scripts intercept it

                // 2. Capture Desktop & Laptop Hardware Wheel Actions (Phase 1 Capture)
                window.addEventListener('wheel', function(e) {
                    if (e.deltaY > 10) {
                        hideHeader(); // Wheel turning down
                    } else if (e.deltaY < -10) {
                        showHeader(); // Wheel turning up
                    }
                }, true);

                // 3. Capture Tablet Native Display Swipes (Phase 1 Capture)
                window.addEventListener('touchstart', function(e) {
                    if (e.touches && e.touches[0]) {
                        touchStartY = e.touches[0].clientY;
                    }
                }, true);

                window.addEventListener('touchmove', function(e) {
                    if (!e.touches || !e.touches[0]) return;
                    const currentTouchY = e.touches[0].clientY;
                    const displacementY = touchStartY - currentTouchY;

                    if (displacementY > 15) {
                        hideHeader(); // Swiped upwards
                        touchStartY = currentTouchY;
                    } else if (displacementY < -15) {
                        showHeader(); // Swiped downwards
                        touchStartY = currentTouchY;
                    }
                }, true);

            } catch (err) {
                console.error("Scroll engine recovery active:", err);
            }
        })();
    </script>
</body>
</html>
